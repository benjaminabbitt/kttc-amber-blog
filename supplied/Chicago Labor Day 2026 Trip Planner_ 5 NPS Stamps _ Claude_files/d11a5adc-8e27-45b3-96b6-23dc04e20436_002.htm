            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: &quot;openExternal&quot;,
            href: url,
          }, &quot;*&quot;);
        };

        window.addEventListener('error', (event) =&gt; {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();

&lt;style&gt;

/* ── HERO ── */

}
.hero-inner { position: relative; max-width: 680px; margin: 0 auto; }
.hero-kicker {
  font-family: 'DM Sans', sans-serif;

.hero-pills {

}
.pill {

.pill-free  { background: rgba(76,175,80,0.18); color: #6ecf72; border: 1px solid rgba(110,207,114,0.3); }

/* ── STAT STRIP ── */
.stats {
  background: var(--navy-mid);

  flex-wrap: wrap;

}
.stat-item {

.stat-n {
  font-family: 'Playfair Display', serif;

.content {

}

/* ── SECTION HEADERS ── */
.section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;

}
.section-label::after {
  content: '';

/* ── TRIP OVERVIEW CARDS ── */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);

}
.overview-card {
  background: white;

  border-radius: 10px;
  padding: 12px 14px;
}
.ov-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-light);
  margin-bottom: 4px;
}
.ov-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
}
.ov-val .accent { color: var(--lake); }

/* ── DAY CARDS ── */
.day-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: box-shadow .18s;
}
.day-card:hover { box-shadow: 0 3px 18px rgba(13,33,55,0.08); }

.day-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 15px;
  cursor: pointer;
  user-select: none;
  background: var(--cream);
  border-bottom: 1px solid transparent;
  transition: background .15s;
}
.day-header:hover { background: var(--sand); }
.day-header.open { background: var(--navy); border-bottom-color: rgba(255,255,255,0.1); }

.day-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--border);
  line-height: 1;
  min-width: 26px;
  transition: color .15s;
}
.day-header.open .day-num { color: rgba(255,255,255,0.25); }

.day-meta { flex: 1; }
.day-date {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-light);
  margin-bottom: 2px;
  transition: color .15s;
}
.day-header.open .day-date { color: var(--gold-light); }
.day-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.2;
  transition: color .15s;
}
.day-header.open .day-title { color: #fff; }
.day-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.chip {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
}
.chip-nps  { background: #e6f1fb; color: #185fa5; }
.chip-food { background: var(--gold-pale); color: #7a5200; }
.chip-wl   { background: #f0e8ff; color: #6b3fa0; }
.chip-park { background: #fde8e6; color: var(--brick); }
.chip-ev   { background: #e8f5e9; color: #1b6b37; }
.chip-hotel{ background: #f3f0ff; color: #4a3590; }

.day-toggle {
  font-size: 11px;
  color: var(--border);
  transition: transform .2s, color .15s;
  margin-top: 2px;
  flex-shrink: 0;
}
.day-header.open .day-toggle { transform: rotate(180deg); color: rgba(255,255,255,0.4); }

.day-body {
  display: none;
  padding: 16px 16px 18px;
  border-top: 1px solid var(--border-light);
}
.day-body.open { display: block; }

/* ── TIMELINE ── */
.timeline { margin-bottom: 16px; }
.tl-item {
  display: grid;
  grid-template-columns: 62px 1fr;
  gap: 0 12px;
  position: relative;
  padding-bottom: 14px;
}
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before {
  content: '';
  position: absolute;
  left: 61px;
  top: 20px;
  bottom: 0;
  width: 1px;
  background: var(--border-light);
}
.tl-item:last-child::before { display: none; }

.tl-time {
  font-size: 11px;
  font-weight: 600;
  color: var(--lake);
  text-align: right;
  padding-top: 1px;
  flex-shrink: 0;
}
.tl-dot {
  position: absolute;
  left: 56px;
  top: 4px;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--lake-light);

}
.tl-dot.gold  { border-color: var(--gold); }
.tl-dot.brick { border-color: var(--brick-light); }
.tl-dot.green { border-color: #4caf50; }

.tl-content { padding-top: 0; }
.tl-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 3px;
  line-height: 1.25;
}
.tl-title .badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 5px;
  vertical-align: middle;
}
.badge-nps   { background: var(--lake-pale); color: var(--lake); }
.badge-food  { background: var(--gold-pale); color: var(--gold); }
.badge-wl    { background: #ede0fe; color: #6b3fa0; }
.badge-ev    { background: #e8f5e9; color: #1b6b37; }
.badge-park  { background: #fde8e6; color: var(--brick); }
.badge-hotel { background: #f3f0ff; color: #4a3590; }

.tl-body {
  font-size: 12px;
  color: var(--text-mid);

  margin-bottom: 5px;
}
.tl-body p { margin-bottom: 5px; }
.tl-body p:last-child { margin-bottom: 0; }
.tl-body strong { color: var(--text); font-weight: 600; }

.tl-meta {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 3px;
}
.tl-meta a { color: var(--lake); text-decoration: none; }

/* ── ALERT BOXES ── */
.alert {
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 11.5px;
  line-height: 1.55;
  margin: 10px 0 4px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.alert-icon { flex-shrink: 0; font-size: 13px; margin-top: 0px; }
.alert-warn { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-text); }

.body-section {

}

/* ── RESTAURANT CARD ── */
.rest-card {

.stamp-card {

  font-weight: 700;

  color: #2a5e8a;

  color: var(--text-mid);

  border-radius: 12px;

  margin-bottom: 10px;

  background: var(--navy);

  font-size: 11px;
  font-weight: 700;
  letter-spacing: .05em;

  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border-light);

.check-detail { font-size: 11px; color: var(--text-light); }

  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 1px;

.urg-asap { background: #fde8e6; color: var(--brick); }
.urg-week { background: var(--warn-bg); color: #7a4800; }

/* ── STAMP SUMMARY ── */
.stamp-summary {
  background: var(--navy);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  color: white;
}
.ss-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--gold-light);
}
.ss-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  font-size: 12px;
}
.ss-item:last-child { border-bottom: none; }
.ss-num {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--gold-light);
  min-width: 20px;
  line-height: 1.2;
}
.ss-park { flex: 1; }
.ss-name { font-weight: 600; color: rgba(255,255,255,0.95); }
.ss-loc { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.ss-day { font-size: 10px; font-weight: 600; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); padding: 2px 8px; border-radius: 8px; align-self: center; white-space: nowrap; }

/* ── FOOD SUMMARY ── */
.food-row {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 6px;
  align-items: start;
  padding: 7px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 12px;
}
.food-row:last-child { border-bottom: none; }
.food-meal {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--text-light);
  padding-top: 1px;
}
.food-name { font-weight: 600; color: var(--navy); }
.food-type { font-size: 11px; color: var(--text-light); }

/* ── MISC ── */
.note-box {
  background: var(--sand);
  border: 1px solid var(--sand-mid);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 11.5px;
  color: var(--text-mid);
  margin: 8px 0;
  line-height: 1.6;
}

@media (max-width: 480px) {
  .overview-grid { grid-template-columns: 1fr; }
  .stats { flex-wrap: wrap; }
  .stat-item { min-width: 50%; border-bottom: 1px solid rgba(255,255,255,0.07); }
}

              &lt;div class=&quot;stamp-meta&quot;&gt;610 E 111th St, Chicago, IL 60628 · (773) 928-7257 · 9AM–5PM daily · Free&lt;/div&gt;
              &lt;div class=&quot;stamp-activity&quot;&gt;The Pullman Administration Clock Tower Building houses both stamps. Exhibits cover labor rights, the Brotherhood of Sleeping Car Porters, immigration, and civil rights. Watch the ranger-narrated film, then walk the Pullman historic neighborhood — the most intact 19th-century planned industrial town in America. The Florence Hotel and Market Hall building are architecturally remarkable.&lt;br&gt;&lt;br&gt;&lt;strong&gt;Emmett Till NM connection:&lt;/strong&gt; Roberts Temple Church of God in Christ at 4021 S State St (Bronzeville, ~15 min north) is the Chicago site — where the open-casket funeral that changed America was held in 1955. Stamp handled at Pullman VC. Respect the private property of the church.&lt;/div&gt;

              &lt;p&gt;&lt;strong&gt;World's Largest Stained Glass Window&lt;/strong&gt; — 40 feet high, wrapping entirely around the 1969 Resurrection Mausoleum building. Nearly 23,000 sq ft across 2,400 panels depicting the History of Man's Salvation. Walk the exterior first, then enter the building.&lt;/p&gt;
              &lt;p&gt;Also: home of &lt;strong&gt;Resurrection Mary&lt;/strong&gt;, Chicago's most enduring ghost legend — a young blond woman in white has reportedly hitchhiked on Archer Avenue since the 1930s, vanishing when cars reach the cemetery gate.&lt;/p&gt;
